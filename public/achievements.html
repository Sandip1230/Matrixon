<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MATRIXON — Achievements</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#020d02;--card:rgba(4,12,4,0.92);--green:#00ff00;--muted:#336633;
  --bronze:#cd7f32;--silver:#c0c0c0;--gold:#ffd700;
  --pro-a:#ff0055;--pro-b:#ff00aa;--legend-a:#cc00ff;--legend-b:#ff44aa;
}
body{font-family:'Share Tech Mono',monospace;background:var(--bg);color:var(--green);min-height:100vh;overflow-x:hidden;}
canvas#rain{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;}

/* ── PARTICLE EXPLOSION ── */
.explode-particle{
  position:fixed;border-radius:50%;pointer-events:none;z-index:9999;
  animation:explode .9s ease-out forwards;
}
/* ── CARD-LEVEL EXPLODE GLOW ── */
@keyframes explode{
  0%  {opacity:1;transform:translate(0,0) scale(1);}
  100%{opacity:0;transform:translate(var(--ex),var(--ey)) scale(0);}
}
@keyframes cardExplode{
  0%  {transform:scale(1);box-shadow:0 0 0 rgba(255,255,255,0);}
  20% {transform:scale(1.4);box-shadow:0 0 40px 30px rgba(255,230,0,.7);}
  40% {transform:scale(.9);box-shadow:0 0 70px 50px rgba(255,180,0,.3);}
  60% {transform:scale(1.2);box-shadow:0 0 25px 15px rgba(0,255,0,.5);}
  80% {transform:scale(1);box-shadow:0 0 12px 6px rgba(0,255,0,.25);}
  100%{transform:scale(1);box-shadow:none;}
}

/* ── UNLOCK POPUP ── */
#unlockPopup{
  position:fixed;top:24px;right:24px;z-index:9998;
  min-width:300px;padding:18px 22px;
  background:rgba(0,0,0,.97);border-radius:16px;
  display:flex;align-items:center;gap:14px;
  transform:translateX(140%);transition:transform .5s cubic-bezier(.22,1,.36,1);
  pointer-events:none;border:2px solid var(--green);
}
#unlockPopup.show{transform:translateX(0);}
#popIcon{font-size:38px;}
#popTitle{font-size:10px;letter-spacing:2px;margin-bottom:3px;}
#popName{font-size:16px;font-weight:bold;color:var(--green);}
#popTier{font-size:12px;margin-top:4px;}

/* ── WRAPPER ── */
.aw{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:24px 16px 60px;}

/* ── TOP BAR ── */
.top-bar{display:flex;align-items:center;gap:14px;margin-bottom:24px;flex-wrap:wrap;}
#backBtn{padding:9px 18px;background:#000;border:1px solid var(--green);color:var(--green);border-radius:10px;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:13px;transition:.2s;}
#backBtn:hover{background:var(--green);color:#000;}
.page-title{font-family:'Orbitron',monospace;font-weight:900;font-size:20px;letter-spacing:4px;text-shadow:0 0 12px var(--green);flex:1;}
.stats-pills{display:flex;gap:8px;flex-wrap:wrap;}
.stat-pill{padding:6px 14px;border-radius:20px;font-size:12px;border:1px solid;letter-spacing:1px;}
.sp-total{border-color:rgba(0,255,0,.3);color:var(--muted);}
.sp-done{border-color:rgba(0,255,136,.4);color:#00ff88;}
.sp-legend{border-color:var(--legend-a);color:var(--legend-a);}

/* ── FILTERS ── */
.filter-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.filter-btn{padding:7px 16px;border-radius:20px;border:1px solid rgba(0,255,0,.2);background:rgba(0,0,0,.5);color:var(--muted);cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:12px;transition:.2s;letter-spacing:1px;}
.filter-btn:hover{border-color:var(--green);color:var(--green);}
.filter-btn.active{background:rgba(0,255,0,.12);border-color:var(--green);color:var(--green);}

/* ── SEARCH ── */
#searchInput{padding:9px 16px;background:rgba(0,0,0,.6);border:1px solid rgba(0,255,0,.2);border-radius:20px;color:var(--green);font-family:'Share Tech Mono',monospace;font-size:13px;outline:none;width:220px;transition:.2s;}
#searchInput:focus{border-color:var(--green);}
#searchInput::placeholder{color:#336633;}

/* ── GRID ── */
#achieveGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(205px,1fr));gap:14px;}

/* ── ACHIEVEMENT CARD ── */
.ac{
  border-radius:14px;padding:16px 14px;
  background:var(--card);border:1px solid #1a2a1a;
  cursor:default;transition:transform .2s,box-shadow .2s;
  position:relative;overflow:hidden;
}
.ac:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.4);}
.ac.locked{opacity:.42;filter:grayscale(.7);}
.ac.unlocked{border-color:rgba(0,255,0,.2);}
.ac.just-unlocked{animation:cardExplode .7s ease forwards;}

/* Tier border glow */
.ac.tier-bronze{border-color:rgba(205,127,50,.55);box-shadow:0 0 12px rgba(205,127,50,.15);}
.ac.tier-silver{border-color:rgba(192,192,192,.5);box-shadow:0 0 12px rgba(192,192,192,.15);}
.ac.tier-gold{border-color:rgba(255,215,0,.6);box-shadow:0 0 16px rgba(255,215,0,.2);}
.ac.tier-pro{border-color:var(--pro-a);box-shadow:0 0 16px rgba(255,0,85,.25);}
.ac.tier-legend{border-color:var(--legend-a);box-shadow:0 0 20px rgba(204,0,255,.3);animation:legendCardPulse 2.5s infinite;}
@keyframes legendCardPulse{0%,100%{box-shadow:0 0 20px rgba(204,0,255,.3)}50%{box-shadow:0 0 35px rgba(255,68,170,.5)}}

/* Card top */
.ac-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.ac-icon{font-size:32px;line-height:1;}

/* Tier badge */
.ac-badge{font-size:9px;font-weight:bold;padding:3px 9px;border-radius:10px;letter-spacing:1px;white-space:nowrap;}
.badge-Bronze{background:#2d1500;color:var(--bronze);border:1px solid var(--bronze);}
.badge-Silver{background:#151515;color:var(--silver);border:1px solid var(--silver);}
.badge-Gold{background:#2a1c00;color:var(--gold);border:1px solid var(--gold);}
.badge-Pro{
  background:linear-gradient(135deg,#2a0015,#1a0020);
  color:#ff66bb;
  border:1px solid var(--pro-a);
  animation:proBorder 2s linear infinite;
}
@keyframes proBorder{0%{border-color:var(--pro-a)}50%{border-color:var(--pro-b)}100%{border-color:var(--pro-a)}}
.badge-Legend{
  background:linear-gradient(135deg,#1a0030,#250018);
  color:#ff88dd;
  border:1px solid var(--legend-a);
  animation:legendBorder 2s linear infinite;
}
@keyframes legendBorder{0%{border-color:var(--legend-a)}50%{border-color:var(--legend-b)}100%{border-color:var(--legend-a)}}
.badge-Locked{background:#111;color:#333;border:1px solid #2a2a2a;}

/* ── TAG CHIP (50% of achievements with hasBadge) ── */
.ac-tag{
  font-size:8px;padding:2px 8px;border-radius:7px;margin:0 0 6px 0;
  display:inline-block;letter-spacing:1px;border:1px solid;font-weight:bold;
}
.tag-Bronze{color:var(--bronze);border-color:rgba(205,127,50,.5);background:rgba(205,127,50,.08);}
.tag-Silver{color:var(--silver);border-color:rgba(192,192,192,.45);background:rgba(192,192,192,.07);}
.tag-Gold{color:var(--gold);border-color:rgba(255,215,0,.5);background:rgba(255,215,0,.07);}
.tag-Pro{
  color:#ff66bb;
  border-color:rgba(255,0,85,.5);
  background:linear-gradient(135deg,rgba(255,0,85,.06),rgba(255,0,170,.06));
  animation:proBorder 2s linear infinite;
}
.tag-Legend{
  color:#ff88dd;
  border-color:rgba(204,0,255,.5);
  background:linear-gradient(135deg,rgba(204,0,255,.06),rgba(255,68,170,.06));
  animation:legendBorder 2s linear infinite;
}
.tag-Locked{color:#333;border-color:#2a2a2a;background:transparent;}

/* Card name & desc */
.ac-name{font-size:13px;color:#dfffdf;font-weight:bold;margin-bottom:4px;line-height:1.3;}
.ac-desc{font-size:10px;color:var(--muted);line-height:1.5;margin-bottom:10px;}

/* 5-segment tier bar */
.tier-dots{display:flex;gap:4px;margin-bottom:8px;}
.td{width:22px;height:6px;border-radius:3px;background:#1a2a1a;transition:background .3s;}
.td.t-bronze{background:var(--bronze);box-shadow:0 0 4px var(--bronze);}
.td.t-silver{background:var(--silver);box-shadow:0 0 4px var(--silver);}
.td.t-gold{background:var(--gold);box-shadow:0 0 6px var(--gold);}
.td.t-pro{background:linear-gradient(to right,var(--pro-a),var(--pro-b));box-shadow:0 0 6px var(--pro-a);}
.td.t-legend{background:linear-gradient(to right,var(--legend-a),var(--legend-b));box-shadow:0 0 8px var(--legend-a);}

/* Next tier info */
.ac-next{font-size:9px;color:#446644;letter-spacing:.5px;}
.ac-next.complete{color:#00ff88;}

/* Category label */
.ac-cat{font-size:8px;color:#224422;letter-spacing:1.5px;position:absolute;bottom:8px;right:10px;}

/* ── EMPTY STATE ── */
#emptyState{text-align:center;padding:60px;color:var(--muted);font-size:14px;letter-spacing:2px;grid-column:1/-1;}
</style>
</head>

(function(){
  const c=document.getElementById('rain'),ctx=c.getContext('2d');
  function r(){c.width=window.innerWidth;c.height=window.innerHeight;}
  r();window.addEventListener('resize',()=>{r();init();});
  const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&アイウエオカキク';
  const fs=14;let cols,drops;
  function init(){cols=Math.floor(c.width/fs);drops=Array(cols).fill(0).map(()=>Math.floor(Math.random()*-40));}
  init();
  setInterval(()=>{
    ctx.fillStyle='rgba(0,0,0,0.06)';ctx.fillRect(0,0,c.width,c.height);
    ctx.font=fs+'px monospace';
    drops.forEach((d,i)=>{
      ctx.fillStyle=d*fs<80?'#ccffcc':'#00ff00';
      ctx.fillText(chars[Math.floor(Math.random()*chars.length)],i*fs,d*fs);
      if(d*fs>c.height&&Math.random()>.975)drops[i]=0;drops[i]++;
    });
  },45);
})();

const TIER_ORDER=['Bronze','Silver','Gold','Pro','Legend'];
const PARTICLE_COLORS={
  Bronze:['#cd7f32','#a0522d','#daa520','#8b4513'],
  Silver:['#c0c0c0','#e0e0e0','#ffffff','#a8a8a8'],
  Gold:['#ffd700','#ffaa00','#fffaaa','#ff8c00'],
  Pro:['#ff0055','#ff44aa','#ff00aa','#ffffff'],
  Legend:['#cc00ff','#ff44aa','#ff88ff','#dd00cc'],
};

let userAchievements={};
let currentFilter='all';let currentSearch='';

async function loadAchievements(){
  try{
    const r=await fetch(`${API}/achievements/tiers/${username}`);
    const data=await r.json();
    if(Array.isArray(data))data.forEach(row=>{userAchievements[row.achievement_id]=row.tier??0;});
  }catch(e){}
  updateStats();renderGrid();
}

function updateStats(){
  const done=Object.keys(userAchievements).length;
  const legends=Object.values(userAchievements).filter(t=>t===4).length;
  document.getElementById('statDone').textContent=done;
  document.getElementById('statLegend').textContent=legends;
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function renderGrid(){
  currentSearch=(document.getElementById('searchInput').value||'').toLowerCase();
  const grid=document.getElementById('achieveGrid');
  grid.innerHTML='';
  const list=ACHIEVEMENTS.filter(a=>{
    if(currentSearch&&!a.name.toLowerCase().includes(currentSearch)&&!a.cat.toLowerCase().includes(currentSearch)&&!(a.tag||'').toLowerCase().includes(currentSearch))return false;
    if(currentFilter==='unlocked')return userAchievements[a.id]!==undefined;
    if(currentFilter==='locked')return userAchievements[a.id]===undefined;
    if(currentFilter==='badge')return a.hasBadge;
    if(['Streak','Learning','Puzzle','Social','Level','Special'].includes(currentFilter))return a.cat===currentFilter;
    return true;
  });
  if(!list.length){
    const e=document.createElement('div');e.id='emptyState';e.textContent='No achievements match this filter.';grid.appendChild(e);return;
  }
  list.forEach(a=>{
    const tier=userAchievements[a.id]??-1;
    const tierName=tier>=0?TIER_ORDER[tier]:null;
    const card=document.createElement('div');
    card.className='ac'+(tier<0?' locked':' unlocked')+(tierName?' tier-'+tierName.toLowerCase():'');
    card.dataset.id=a.id;

    let dotsHTML='<div class="tier-dots">';
    for(let i=0;i<5;i++){
      const filled=i<=tier;
      dotsHTML+=`<div class="td${filled?' t-'+TIER_ORDER[i].toLowerCase():''}"></div>`;
    }
    dotsHTML+='</div>';

    const next=tier<4?a.tiers[tier+1]:null;
    const nextHTML=tier>=4
      ?'<div class="ac-next complete">✓ MAX TIER REACHED</div>'
      :next?`<div class="ac-next">Next: ${next.req}</div>`
      :`<div class="ac-next">Start: ${a.tiers[0].req}</div>`;

    // Tag chip — only for hasBadge achievements, styled per current tier
    const tagCls=tierName?'tag-'+tierName:'tag-Locked';
    const tagHTML=a.hasBadge&&a.tag
      ?`<span class="ac-tag ${tagCls}">${a.tag}</span>`:'';

    card.innerHTML=`
      <div class="ac-top">
        <div class="ac-icon">${a.icon}</div>
        <span class="ac-badge badge-${tierName||'Locked'}">${tierName||'LOCKED'}</span>
      </div>
      <div class="ac-name">${a.name}</div>
      ${tagHTML}
      <div class="ac-desc">${a.desc}</div>
      ${dotsHTML}
      ${nextHTML}
      <div class="ac-cat">${a.cat.toUpperCase()}${a.hasBadge?' • 🏅':''}</div>
    `;
    card.title=a.tiers.map(t=>`${t.l}: ${t.req}`).join(' | ');
    grid.appendChild(card);
  });
}

/* ── PARTICLE EXPLOSION ── */
function explodeAt(x,y,tierName){
  const cols=(PARTICLE_COLORS[tierName]||['#00ff00','#aaffaa']);
  for(let i=0;i<60;i++){
    const p=document.createElement('div');p.className='explode-particle';
    const angle=Math.random()*Math.PI*2,dist=60+Math.random()*200;
    const ex=Math.cos(angle)*dist,ey=Math.sin(angle)*dist;
    const sz=4+Math.random()*8,color=cols[Math.floor(Math.random()*cols.length)];
    p.style.cssText=`left:${x}px;top:${y}px;width:${sz}px;height:${sz}px;background:${color};box-shadow:0 0 6px ${color};--ex:${ex}px;--ey:${ey}px;`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),900);
  }
}

/* ── SHOW UNLOCK POPUP ── */
function showUnlockPopup(achievement,tierName){
  const tierColors={Bronze:'#cd7f32',Silver:'#c0c0c0',Gold:'#ffd700',Pro:'#ff55aa',Legend:'#ff88dd'};
  const popup=document.getElementById('unlockPopup');
  const border=tierColors[tierName]||'#00ff00';
  popup.style.border=`2px solid ${border}`;
  popup.style.boxShadow=`0 0 30px ${border}55`;
  document.getElementById('popIcon').textContent=achievement.icon;
  document.getElementById('popName').textContent=achievement.name;document.getElementById('popName').style.color=border;
  document.getElementById('popTitle').textContent='🏆 TIER UPGRADED!';document.getElementById('popTitle').style.color=border;
  document.getElementById('popTier').innerHTML=`<span style="color:${border};font-weight:bold">${tierName} Tier Unlocked!</span>`;
  popup.classList.add('show');
  setTimeout(()=>popup.classList.remove('show'),4500);
  localStorage.setItem('matrixon_new_achievements','true');
}

/* ── POLL FOR NEW ACHIEVEMENTS ── */
let knownTiers={...userAchievements};
setInterval(async()=>{
  try{
    const r=await fetch(`${API}/achievements/tiers/${username}`);
    const data=await r.json();if(!Array.isArray(data))return;
    data.forEach(row=>{
      const prev=knownTiers[row.achievement_id]??-1;const curr=row.tier??0;
      if(curr>prev){
        const a=ACHIEVEMENTS.find(x=>x.id===row.achievement_id);
        if(a){
          const tierName=TIER_ORDER[curr];
          // Card burst + card glow
          const cards=document.querySelectorAll(`[data-id="${row.achievement_id}"]`);
          if(cards[0]){
            cards[0].classList.add('just-unlocked');
            setTimeout(()=>cards[0].classList.remove('just-unlocked'),700);
            const rect=cards[0].getBoundingClientRect();
            explodeAt(rect.left+rect.width/2,rect.top+rect.height/2,tierName);
          }else{
            explodeAt(window.innerWidth/2,window.innerHeight/2,tierName);
          }
          showUnlockPopup(a,tierName);
          userAchievements[row.achievement_id]=curr;
          knownTiers[row.achievement_id]=curr;
          renderGrid();updateStats();
        }
      }
    });
  }catch(e){}
},30000);

loadAchievements();
